<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>goldantelopeethx500 — MEXC Signal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}?v=23">
</head>
<body>
<div class="container-fluid px-3 py-3">

    <!-- ═══ TOP BAR ═══ -->
    <div class="top-bar mb-3">
        <div class="top-bar__logo">
            <img src="{{ url_for('static', filename='img/mexc_logo.jpg') }}" alt="MEXC" class="top-bar__logo-img">
            <span class="top-bar__sub">GoldantelopeMEXC</span>
        </div>
        <div class="top-bar__controls">
            <span id="bot-status" class="status-pill status-pill--stopped">● STOPPED</span>
            <button id="start-bot" class="ctrl-btn ctrl-btn--green">
                <i class="fas fa-play"></i> Start
            </button>
            <button id="stop-bot" class="ctrl-btn ctrl-btn--red">
                <i class="fas fa-stop"></i> Stop
            </button>
            <div class="ctrl-divider"></div>
            <button id="counter-trade" class="ctrl-btn ctrl-btn--ghost" title="Контр трейд — инвертировать сигнал">
                <i class="fas fa-retweet"></i> Контр трейд
            </button>
            <div class="ctrl-divider"></div>
            <button id="reset-balance" class="ctrl-btn ctrl-btn--ghost" title="Reset Balance">
                <i class="fas fa-redo"></i> Reset
            </button>
            <button id="delete-trade" class="ctrl-btn ctrl-btn--ghost" title="Delete Last Trade">
                <i class="fas fa-trash"></i> Del
            </button>
        </div>
    </div>


    <!-- ═══ STATS + SETTINGS ROW ═══ -->
    <div class="row g-3 mb-3">

        <!-- Balance -->
        <div class="col-md-3 col-6">
            <div class="stat-card stat-card--green">
                <div class="stat-card__label"><i class="fas fa-wallet me-1"></i> Баланс</div>
                <div class="stat-card__value" id="balance">$0.00</div>
            </div>
        </div>

        <!-- Available -->
        <div class="col-md-3 col-6">
            <div class="stat-card stat-card--blue">
                <div class="stat-card__label"><i class="fas fa-coins me-1"></i> Доступно</div>
                <div class="stat-card__value" id="available">$0.00</div>
            </div>
        </div>

        <!-- ETH Price -->
        <div class="col-md-3 col-6">
            <div class="stat-card stat-card--yellow">
                <div class="stat-card__label"><i class="fab fa-ethereum me-1"></i> ETH Цена</div>
                <div class="stat-card__value" id="current-price">$0.00</div>
            </div>
        </div>

        <!-- Settings -->
        <div class="col-md-3 col-6">
            <div class="stat-card stat-card--dark settings-card">
                <div class="settings-row">
                    <span class="settings-label">Ставка</span>
                    <div class="seg-ctrl">
                        <button class="seg-btn seg-btn--blue bet-btn active-setting" data-bet="5"  onclick="window.dashboard.setBet(5)">$5</button>
                        <button class="seg-btn seg-btn--blue bet-btn"                data-bet="10" onclick="window.dashboard.setBet(10)">$10</button>
                        <button class="seg-btn seg-btn--blue bet-btn"                data-bet="20" onclick="window.dashboard.setBet(20)">$20</button>
                    </div>
                </div>
                <div class="settings-divider"></div>
                <div class="settings-row">
                    <span class="settings-label">Время</span>
                    <div class="seg-ctrl">
                        <button class="seg-btn seg-btn--amber dur-btn active-setting" data-dur="600"  onclick="window.dashboard.setDuration(600)">10m</button>
                        <button class="seg-btn seg-btn--amber dur-btn"                data-dur="1800" onclick="window.dashboard.setDuration(1800)">30m</button>
                        <button class="seg-btn seg-btn--amber dur-btn"                data-dur="3600" onclick="window.dashboard.setDuration(3600)">60m</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══ MAIN GRID ═══ -->
    <div class="row g-3">

        <!-- Active Positions -->
        <div class="col-xl-8">
            <div class="panel">
                <div class="panel__header">
                    <span><i class="fas fa-crosshairs"></i> Активные позиции</span>
                </div>
                <div class="panel__body p-0">
                    <div id="no-positions" class="empty-state">
                        <i class="fas fa-circle-notch fa-2x mb-2 opacity-50"></i>
                        <p class="mb-0 opacity-50">Нет открытых позиций</p>
                    </div>
                    <div id="positions-list" class="list-group list-group-flush"></div>
                </div>
            </div>
        </div>

        <!-- Right column -->
        <div class="col-xl-4 d-flex flex-column gap-3">

            <!-- AI Servers Panel -->
            <div class="panel">
                <div class="panel__header">
                    <span><i class="fas fa-robot"></i> AI Серверы</span>
                    <span id="ai-consensus-badge" class="badge ai-consensus-badge--idle">— Нет опроса</span>
                </div>
                <div class="panel__body p-2">

                    <!-- AI Server Cards -->
                    <div class="ai-servers-grid">
                        <div class="ai-server-card" id="ai-card-chatgpt">
                            <div class="ai-server-icon ai-icon--chatgpt"><i class="fas fa-comment-dots"></i></div>
                            <div class="ai-server-name">ChatGPT</div>
                            <div class="ai-server-badge" id="ai-vote-chatgpt">—</div>
                        </div>
                        <div class="ai-server-card" id="ai-card-gemini">
                            <div class="ai-server-icon ai-icon--gemini"><i class="fas fa-gem"></i></div>
                            <div class="ai-server-name">Gemini</div>
                            <div class="ai-server-badge" id="ai-vote-gemini">—</div>
                        </div>
                        <div class="ai-server-card" id="ai-card-grok">
                            <div class="ai-server-icon ai-icon--grok"><i class="fas fa-bolt"></i></div>
                            <div class="ai-server-name">Grok</div>
                            <div class="ai-server-badge" id="ai-vote-grok">—</div>
                        </div>
                        <div class="ai-server-card" id="ai-card-deepseek">
                            <div class="ai-server-icon ai-icon--deepseek"><i class="fas fa-brain"></i></div>
                            <div class="ai-server-name">DeepSeek</div>
                            <div class="ai-server-badge" id="ai-vote-deepseek">—</div>
                        </div>
                    </div>

                    <!-- Vote tally -->
                    <div class="ai-tally mt-2" id="ai-tally" style="display:none">
                        <span class="ai-tally__long"><i class="fas fa-arrow-up"></i> LONG: <b id="ai-long-count">0</b></span>
                        <span class="ai-tally__vs">vs</span>
                        <span class="ai-tally__short"><i class="fas fa-arrow-down"></i> SHORT: <b id="ai-short-count">0</b></span>
                    </div>

                    <!-- Poll button -->
                    <button id="ai-poll-btn" class="ai-poll-btn mt-2" onclick="window.dashboard.pollAI()">
                        <i class="fas fa-satellite-dish"></i> Опросить AI
                    </button>

                    <!-- Open position buttons (shown after poll) -->
                    <div id="ai-action-btns" class="ai-action-btns mt-2" style="display:none">
                        <button class="ai-open-btn ai-open-btn--long" onclick="window.dashboard.openAIPosition('long')">
                            <i class="fas fa-arrow-up"></i> LONG (1ч)
                        </button>
                        <button class="ai-open-btn ai-open-btn--short" onclick="window.dashboard.openAIPosition('short')">
                            <i class="fas fa-arrow-down"></i> SHORT (1ч)
                        </button>
                    </div>

                    <div id="ai-poll-time" class="ai-poll-time" style="display:none"></div>
                </div>
            </div>


            <!-- Trade History -->
            <div class="panel flex-grow-1">
                <div class="panel__header">
                    <span><i class="fas fa-history"></i> История сделок</span>
                    <button id="clear-history" class="ctrl-btn ctrl-btn--ghost ctrl-btn--sm">
                        <i class="fas fa-trash"></i> Очистить
                    </button>
                </div>
                <div class="panel__body p-0">
                    <div id="trades-container" style="max-height:320px;overflow-y:auto;">
                        <div class="empty-state">
                            <i class="fas fa-clock fa-2x mb-2 opacity-50"></i>
                            <p class="mb-0 opacity-50">Нет завершённых сделок</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Result Modal -->
<div class="modal fade" id="resultModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content result-modal">
            <div class="modal-body text-center py-5">
                <h1 id="result-title" class="text-success mb-3">WIN!</h1>
                <p id="result-message" class="text-muted mb-3"></p>
                <h3 id="result-pnl" class="text-success mb-4">+$4.00</h3>
                <button type="button" class="ctrl-btn ctrl-btn--blue px-4" data-bs-dismiss="modal">Закрыть</button>
            </div>
        </div>
    </div>
</div>

<!-- Signal sound (data URI beep) -->
<audio id="signal-sound" preload="auto">
    <source src="data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAA..." type="audio/wav">
</audio>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="{{ url_for('static', filename='js/dashboard.js') }}?v=23"></script>
</body>
</html>
