<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>goldantelopeethx500 — MEXC Signal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}?v=12">
</head>
<body>
<div class="container-fluid px-3 py-3">

    <!-- ═══ TOP BAR ═══ -->
    <div class="top-bar mb-3">
        <div class="top-bar__logo">
            <img src="{{ url_for('static', filename='img/mexc_logo.jpg') }}" alt="MEXC" class="top-bar__logo-img">
            <span class="top-bar__sub">ETH/USDT Signal</span>
        </div>
        <div class="top-bar__controls">
            <span id="bot-status" class="status-pill status-pill--stopped">● STOPPED</span>
            <button id="start-bot" class="ctrl-btn ctrl-btn--green">
                <i class="fas fa-play"></i> Start
            </button>
            <button id="stop-bot" class="ctrl-btn ctrl-btn--red">
                <i class="fas fa-stop"></i> Stop
            </button>
            <div class="ctrl-divider"></div>
            <button id="reset-balance" class="ctrl-btn ctrl-btn--ghost" title="Reset Balance">
                <i class="fas fa-redo"></i> Reset
            </button>
            <button id="delete-trade" class="ctrl-btn ctrl-btn--ghost" title="Delete Last Trade">
                <i class="fas fa-trash"></i> Del
            </button>
        </div>
    </div>


    <!-- ═══ STATS + SETTINGS ROW ═══ -->
    <div class="row g-3 mb-3">

        <!-- Balance -->
        <div class="col-md-3 col-6">
            <div class="stat-card stat-card--green">
                <div class="stat-card__label"><i class="fas fa-wallet me-1"></i> Баланс</div>
                <div class="stat-card__value" id="balance">$0.00</div>
            </div>
        </div>

        <!-- Available -->
        <div class="col-md-3 col-6">
            <div class="stat-card stat-card--blue">
                <div class="stat-card__label"><i class="fas fa-coins me-1"></i> Доступно</div>
                <div class="stat-card__value" id="available">$0.00</div>
            </div>
        </div>

        <!-- ETH Price -->
        <div class="col-md-3 col-6">
            <div class="stat-card stat-card--yellow">
                <div class="stat-card__label"><i class="fab fa-ethereum me-1"></i> ETH Цена</div>
                <div class="stat-card__value" id="current-price">$0.00</div>
            </div>
        </div>

        <!-- Settings -->
        <div class="col-md-3 col-6">
            <div class="stat-card stat-card--dark settings-card">
                <div class="settings-row">
                    <span class="settings-label">Ставка</span>
                    <div class="seg-ctrl">
                        <button class="seg-btn seg-btn--blue bet-btn active-setting" data-bet="5"  onclick="window.dashboard.setBet(5)">$5</button>
                        <button class="seg-btn seg-btn--blue bet-btn"                data-bet="10" onclick="window.dashboard.setBet(10)">$10</button>
                        <button class="seg-btn seg-btn--blue bet-btn"                data-bet="20" onclick="window.dashboard.setBet(20)">$20</button>
                    </div>
                </div>
                <div class="settings-divider"></div>
                <div class="settings-row">
                    <span class="settings-label">Время</span>
                    <div class="seg-ctrl">
                        <button class="seg-btn seg-btn--amber dur-btn active-setting" data-dur="600"  onclick="window.dashboard.setDuration(600)">10m</button>
                        <button class="seg-btn seg-btn--amber dur-btn"                data-dur="1800" onclick="window.dashboard.setDuration(1800)">30m</button>
                        <button class="seg-btn seg-btn--amber dur-btn"                data-dur="3600" onclick="window.dashboard.setDuration(3600)">60m</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══ MAIN GRID ═══ -->
    <div class="row g-3">

        <!-- Active Positions -->
        <div class="col-xl-8">
            <div class="panel">
                <div class="panel__header">
                    <span><i class="fas fa-crosshairs"></i> Активные позиции</span>
                </div>
                <div class="panel__body p-0">
                    <div id="no-positions" class="empty-state">
                        <i class="fas fa-circle-notch fa-2x mb-2 opacity-50"></i>
                        <p class="mb-0 opacity-50">Нет открытых позиций</p>
                    </div>
                    <div id="positions-list" class="list-group list-group-flush"></div>
                </div>
            </div>
        </div>

        <!-- Right column -->
        <div class="col-xl-4 d-flex flex-column gap-3">

            <!-- SAR Signal Panel -->
            <div class="panel">
                <div class="panel__header">
                    <span><i class="fas fa-satellite-dish"></i> SAR Сигнал</span>
                    <span id="strategy-level-label" class="badge bg-primary" style="font-size:11px">L3 · 1m+3m+5m</span>
                </div>
                <div class="panel__body">

                    <!-- SAR Rows с мультивыбором таймфреймов -->
                    <div class="sar-row mb-2" id="sar-1m-container">
                        <button class="lvl-btn--inline" data-tf="1m" onclick="window.dashboard.toggleStrategyTf('1m')" title="Вкл/выкл 1m в стратегии">L1</button>
                        <span class="sar-level">SAR <span class="text-muted" style="font-size:11px">1m</span></span>
                        <span id="sar-1m" class="badge sar-badge">N/A</span>
                    </div>
                    <div class="sar-row mb-2" id="sar-3m-container">
                        <button class="lvl-btn--inline" data-tf="3m" onclick="window.dashboard.toggleStrategyTf('3m')" title="Вкл/выкл 3m в стратегии">L2</button>
                        <span class="sar-level">SAR <span class="text-muted" style="font-size:11px">3m</span></span>
                        <span id="sar-3m" class="badge sar-badge">N/A</span>
                    </div>
                    <div class="sar-row mb-2" id="sar-5m-container">
                        <button class="lvl-btn--inline" data-tf="5m" onclick="window.dashboard.toggleStrategyTf('5m')" title="Вкл/выкл 5m в стратегии">L3</button>
                        <span class="sar-level">SAR <span class="text-muted" style="font-size:11px">5m</span></span>
                        <span id="sar-5m" class="badge sar-badge">N/A</span>
                    </div>
                    <div class="sar-row mb-2" id="sar-15m-container">
                        <button class="lvl-btn--inline" data-tf="15m" onclick="window.dashboard.toggleStrategyTf('15m')" title="Вкл/выкл 15m в стратегии">L4</button>
                        <span class="sar-level">SAR <span class="text-muted" style="font-size:11px">15m</span></span>
                        <span id="sar-15m" class="badge sar-badge">N/A</span>
                    </div>
                    <div class="sar-row mb-2" id="sar-30m-container">
                        <button class="lvl-btn--inline" data-tf="30m" onclick="window.dashboard.toggleStrategyTf('30m')" title="Вкл/выкл 30m в стратегии">L5</button>
                        <span class="sar-level">SAR <span class="text-muted" style="font-size:11px">30m</span></span>
                        <span id="sar-30m" class="badge sar-badge">N/A</span>
                    </div>
                </div>
            </div>


            <!-- Trade History -->
            <div class="panel flex-grow-1">
                <div class="panel__header">
                    <span><i class="fas fa-history"></i> История сделок</span>
                    <button id="clear-history" class="ctrl-btn ctrl-btn--ghost ctrl-btn--sm">
                        <i class="fas fa-trash"></i> Очистить
                    </button>
                </div>
                <div class="panel__body p-0">
                    <div id="trades-container" style="max-height:320px;overflow-y:auto;">
                        <div class="empty-state">
                            <i class="fas fa-clock fa-2x mb-2 opacity-50"></i>
                            <p class="mb-0 opacity-50">Нет завершённых сделок</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Result Modal -->
<div class="modal fade" id="resultModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content result-modal">
            <div class="modal-body text-center py-5">
                <h1 id="result-title" class="text-success mb-3">WIN!</h1>
                <p id="result-message" class="text-muted mb-3"></p>
                <h3 id="result-pnl" class="text-success mb-4">+$4.00</h3>
                <button type="button" class="ctrl-btn ctrl-btn--blue px-4" data-bs-dismiss="modal">Закрыть</button>
            </div>
        </div>
    </div>
</div>

<!-- Signal sound (data URI beep) -->
<audio id="signal-sound" preload="auto">
    <source src="data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAA..." type="audio/wav">
</audio>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/dashboard.js') }}?v=12"></script>
</body>
</html>
